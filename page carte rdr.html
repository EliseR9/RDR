<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./image/Rdr2 img.jpg">
    <title>Red Dead Redemption </title>
    <link rel="stylesheet" href="projet site css.css">
</head>
<body>
    <h1>Red Dead Redemption</h1>
         <div class="tabs">
        <button class="tab-button">
            <a href="./projet site info.html">Histoire</a>
        </button>

        <button class="tab-button">
            <a href="page personnages.html">Personnages</a>
        </button>

        <button class="tab-button">
            <a href="page carte rdr.html">Carte Interactive</a>
        </button>
    </div>

    </div>
    <script>
        document.addEventListener('mousemove', e => {
            const trail = document.createElement('div');
            trail.classList.add('trail');
            trail.style.left = e.pageX + 'px';
            trail.style.top = e.pageY + 'px';
            document.body.appendChild(trail);
        
            // Supprime la trace après l'animation pour ne pas saturer la page
            setTimeout(() => {
                trail.remove();
            }, 500); // correspond à la durée de l'animation
        });
        
        </script>
        <script>
            function openTab(tabId) {
                // Cacher tous les contenus
                const contents = document.querySelectorAll('.tab-content');
                contents.forEach(content => content.classList.remove('active'));
    
                // Retirer la classe active des boutons
                const buttons = document.querySelectorAll('.tab-button');
                buttons.forEach(button => button.classList.remove('active'));
    
                // Afficher le bon onglet
                document.getElementById(tabId).classList.add('active');
                event.target.classList.add('active');
            }
        </script>
           <div id="map-container">
  <img id="map" src="image/rdr2 carte.jpg" alt="Carte de rdr2">

  <!-- Marqueurs -->
  <div class="marker" style="top: 45%; left: 43%;" data-name="Valentine" data-desc="Une des premières ville qu'on découvre dans le chapitre 2"></div>
  <div class="marker" style="top: 80%; left: 36%;" data-name="Blackwater" data-desc="Une ville ou on comprend vite qu'au début du jeu, on a commis un braquage et nous ne sommes plus la bienvenue pendant quelques temps"></div>
  <div class="marker" style="top: 48%; left: 86%;" data-name="Van Horn" data-desc="Une petite ville/village ou il se passe pas mal de mission"></div>
  <div class="marker" style="top: 32%; left: 52%;" data-name="Fort Wallace" data-desc="Un camp militaire ou il est interdit de rentrer"></div>
  <div class="marker" style="top: 82%; left: 63%;" data-name="Rhodes" data-desc="Une ville dominée par la rivalité violente entre les familles Gray et Braithwaite" ></div>
  <div class="marker" style="top: 66%; left: 65%;" data-name="Lemoyne" data-desc="Une belle région avec pas mal de criminel"></div>
  <div class="marker" style="top: 34%; left: 85%;" data-name="Annesburg" data-desc="Une ville qui n'est pas loin de la ou s'installe le camp dans le chapitre 6"></div>
  <div class="marker" style="top: 67%; left: 23%;" data-name="Strawberry" data-desc="Une ville en montagne qui attire les touristes"></div>
  <div class="marker" style="top: 70%; left: 90%;" data-name="Pénitencier de Sisika" data-desc="Une prison a l'est de la plus grande ville ou un membre s'est fait emprisoner"></div>
  <div class="marker" style="top: 80%; left: 82%;" data-name="Saint-Denis" data-desc="La plus grande ville, elle est très evoluée pour les années 1890"></div>
  <div class="marker" style="top: 18%; left: 53%;" data-name="Les Wapitis" data-desc="Un tout petit village d'indiens, où il est interdit d'utiliser des armes"></div>
</div>

<!--afficher l'info sous la carte -->
<div id="info-container">
  <h2 id="info-title">Clique sur un lieu</h2>
  <p id="info-desc">Les détails apparaîtront ici.</p>
</div>

<!-- CSS -->
<style>
  body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f4;
  }

  #map-container {
      position: relative;
      width: 800px;
      height: 600px;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
      overflow: hidden;
  }

  #map {
      width: 100%;
      height: 100%;
      object-fit: cover;
  }
  

  .marker {
      position: absolute;
      width: 15px;
      height: 15px;
      background-color: red;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: pointer;
      border: 2px solid white;
  }

  #info-container {
      margin-top: 20px;
      padding: 10px;
      width: 800px;
      text-align: center;
      background: white;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
  }

  #info-title {
      margin: 0;
      font-size: 20px;
  }

  #info-desc {
      font-size: 16px;
      color: #555;
  }
</style>
<!-- JavaScript -->
<script>
  const markers = document.querySelectorAll(".marker");
  const infoTitle = document.getElementById("info-title");
  const infoDesc = document.getElementById("info-desc");

  markers.forEach(marker => {
      marker.addEventListener("click", () => {
          infoTitle.innerText = marker.dataset.name;
          infoDesc.innerText = marker.dataset.desc;
      });
  });
</script>
</body>
</html>
